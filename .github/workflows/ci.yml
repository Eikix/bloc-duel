name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  contracts-build:
    name: Contracts — Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Build contracts
        run: nix develop --accept-flake-config -c bash -lc 'cd contracts && sozo build'

  contracts-test:
    name: Contracts — Test
    runs-on: ubuntu-latest
    needs: contracts-build
    steps:
      - uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Run contract tests
        run: nix develop --accept-flake-config -c bash -lc 'cd contracts && sozo test'

  contracts-fmt:
    name: Contracts — Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Check formatting
        run: nix develop --accept-flake-config -c bash -lc 'cd contracts && scarb fmt --check'

  client-build:
    name: Client — Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check and build
        run: npm run build

  client-lint:
    name: Client — Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint
