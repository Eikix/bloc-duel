name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  SCARB_VERSION: "2.13.1"
  DOJO_VERSION: "v1.8.5"

jobs:
  contracts-build:
    name: Contracts — Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Scarb
        uses: software-mansion/setup-scarb@v1
        with:
          scarb-version: ${{ env.SCARB_VERSION }}

      - name: Install asdf
        uses: asdf-vm/actions/setup@v3

      - name: Install Dojo
        run: |
          asdf plugin add dojo https://github.com/dojoengine/asdf-dojo.git
          asdf install dojo ${{ env.DOJO_VERSION }}
          asdf set dojo ${{ env.DOJO_VERSION }}

      - name: Build contracts
        working-directory: contracts
        run: sozo build

  contracts-test:
    name: Contracts — Test
    runs-on: ubuntu-latest
    needs: contracts-build
    steps:
      - uses: actions/checkout@v4

      - name: Setup Scarb
        uses: software-mansion/setup-scarb@v1
        with:
          scarb-version: ${{ env.SCARB_VERSION }}

      - name: Install asdf
        uses: asdf-vm/actions/setup@v3

      - name: Install Dojo
        run: |
          asdf plugin add dojo https://github.com/dojoengine/asdf-dojo.git
          asdf install dojo ${{ env.DOJO_VERSION }}
          asdf set dojo ${{ env.DOJO_VERSION }}

      - name: Run contract tests
        working-directory: contracts
        run: sozo test

  contracts-fmt:
    name: Contracts — Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Scarb
        uses: software-mansion/setup-scarb@v1
        with:
          scarb-version: ${{ env.SCARB_VERSION }}

      - name: Check formatting
        working-directory: contracts
        run: scarb fmt --check

  client-build:
    name: Client — Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check and build
        run: npm run build

  client-lint:
    name: Client — Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint
