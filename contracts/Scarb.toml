[package]
name = "bloc_duel"
version = "1.8.0"
edition = "2024_07"

[cairo]
sierra-replace-ids = true

[scripts]
migrate = "sozo build && sozo migrate"
sepolia_build = "sozo -P sepolia build"
migrate_sepolia = "sozo -P sepolia migrate"
torii_sepolia = "slot deployments create bloc-duel-sepolia torii --team zkorp --config ./torii_sepolia.toml"

[dependencies]
dojo = "1.8.0"
starknet = "2.13.1"

[[target.starknet-contract]]
build-external-contracts = [
    "dojo::world::world_contract::world"
]

[tool.scarb]
allow-prebuilt-plugins = ["dojo_cairo_macros"]

[dev-dependencies]
cairo_test = "2.13.1"
dojo_cairo_test = "1.8.0"

[profile.mainnet]
[profile.sepolia]
